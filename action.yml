name: 'Signal-OSS Issue Triage'
description: 'Scores GitHub issues for actionability and posts a missing-info checklist'
author: 'Signal-OSS'

inputs:
  github-token:
    description: 'GitHub token (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  dry-run:
    description: 'If true, skip posting comment and applying labels'
    required: false
    default: 'false'
  enable-comments:
    description: 'If false, skip posting the checklist comment'
    required: false
    default: 'true'
  enable-labels:
    description: 'If false, skip label management'
    required: false
    default: 'true'
  label-name:
    description: 'Name of the label to apply when checklist has items'
    required: false
    default: 'needs-info'
  model:
    description: 'LLM model identifier (used in Phase 4)'
    required: false
    default: ''
  gray-zone-low:
    description: 'Lower bound of gray zone (inclusive)'
    required: false
    default: '4'
  gray-zone-high:
    description: 'Upper bound of gray zone (inclusive)'
    required: false
    default: '6'
  max-body-bytes:
    description: 'Maximum issue body bytes to analyze (truncated before scoring)'
    required: false
    default: '10000'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'check-square'
  color: 'blue'
